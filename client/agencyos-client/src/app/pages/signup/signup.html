<section class="auth-page">
  <div class="auth-card">
    <a class="brand-link" routerLink="/dashboard">AgencyOS</a>

    <p class="eyebrow">Start organized</p>
    <h1>Create account</h1>
    <p class="auth-copy">Set up the front-end entry point now. User registration will connect to the API later.</p>

    <form class="auth-form">
      <label>
        Name
        <input type="text" placeholder="Your name" />
      </label>

      <label>
        Email
        <input type="email" placeholder="you@example.com" />
      </label>

      <label>
        Password
        <input type="password" placeholder="Create a password" />
      </label>

      <button class="primary-button" type="button">Sign up</button>
    </form>

    <p class="auth-switch">
      Already have an account?
      <a class="text-link" routerLink="/login">Log in</a>
    </p>
  </div>
</section>
