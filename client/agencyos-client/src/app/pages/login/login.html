<section class="auth-page">
  <div class="auth-card">
    <a class="brand-link" routerLink="/dashboard">AgencyOS</a>

    <p class="eyebrow">Welcome back</p>
    <h1>Log in</h1>
    <p class="auth-copy">Access your agency workspace. Authentication logic will be added later.</p>

    <form class="auth-form">
      <label>
        Email
        <input type="email" placeholder="you@example.com" />
      </label>

      <label>
        Password
        <input type="password" placeholder="Enter your password" />
      </label>

      <button class="primary-button" type="button">Log in</button>
    </form>

    <p class="auth-switch">
      New to AgencyOS?
      <a class="text-link" routerLink="/signup">Create an account</a>
    </p>
  </div>
</section>
