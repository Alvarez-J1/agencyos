<aside class="sidebar" aria-label="AgencyOS navigation">
  <a class="sidebar-brand" routerLink="/dashboard">
    <img class="brand-logo" src="agencyos-logo.png" alt="AgencyOS" />
  </a>

  <nav class="sidebar-nav" aria-label="Primary">
    @for (item of navItems; track item.route) {
      <a
        [routerLink]="item.route"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: item.exact }"
        ariaCurrentWhenActive="page"
      >
        <span class="nav-icon" aria-hidden="true">
          @switch (item.icon) {
            @case ('dashboard') {
              <svg viewBox="0 0 24 24">
                <path d="M4 5.5A1.5 1.5 0 0 1 5.5 4h4A1.5 1.5 0 0 1 11 5.5v5A1.5 1.5 0 0 1 9.5 12h-4A1.5 1.5 0 0 1 4 10.5v-5Zm9 0A1.5 1.5 0 0 1 14.5 4h4A1.5 1.5 0 0 1 20 5.5v2A1.5 1.5 0 0 1 18.5 9h-4A1.5 1.5 0 0 1 13 7.5v-2ZM4 16.5A1.5 1.5 0 0 1 5.5 15h4a1.5 1.5 0 0 1 1.5 1.5v2A1.5 1.5 0 0 1 9.5 20h-4A1.5 1.5 0 0 1 4 18.5v-2Zm9-3A1.5 1.5 0 0 1 14.5 12h4a1.5 1.5 0 0 1 1.5 1.5v5a1.5 1.5 0 0 1-1.5 1.5h-4a1.5 1.5 0 0 1-1.5-1.5v-5Z" />
              </svg>
            }
            @case ('clients') {
              <svg viewBox="0 0 24 24">
                <path d="M8.5 11a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Zm7-1a3 3 0 1 0 0-6 3 3 0 0 0 0 6ZM3 18.25C3 15.35 5.46 13 8.5 13S14 15.35 14 18.25V19a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1v-.75Zm12.6-5.24c2.95.18 5.4 2.46 5.4 5.24V19a1 1 0 0 1-1 1h-4.25c.16-.31.25-.65.25-1v-.75a7.2 7.2 0 0 0-1.78-4.74c.44-.26.9-.43 1.38-.5Z" />
              </svg>
            }
            @case ('projects') {
              <svg viewBox="0 0 24 24">
                <path d="M4 6.5A2.5 2.5 0 0 1 6.5 4h11A2.5 2.5 0 0 1 20 6.5v11a2.5 2.5 0 0 1-2.5 2.5h-11A2.5 2.5 0 0 1 4 17.5v-11Zm3 1.25v2h10v-2H7Zm0 4.5v4h4.25v-4H7Zm6.75 0v4H17v-4h-3.25Z" />
              </svg>
            }
            @case ('tasks') {
              <svg viewBox="0 0 24 24">
                <path d="M6.2 7.7 4.8 6.3 3.4 7.7l2.8 2.8 4.4-4.4-1.4-1.4-3 3Zm0 7 4.4-4.4-1.4-1.4-3 3-1.4-1.4-1.4 1.4 2.8 2.8ZM13 7h8v2h-8V7Zm0 6h8v2h-8v-2Zm0 4h5v2h-5v-2Z" />
              </svg>
            }
            @case ('settings') {
              <svg viewBox="0 0 24 24">
                <path d="M11 3h2l.55 2.24c.57.18 1.1.4 1.6.69l2-1.2 1.42 1.42-1.2 2c.29.5.51 1.03.69 1.6L20.3 10v2l-2.24.55c-.18.57-.4 1.1-.69 1.6l1.2 2-1.42 1.42-2-1.2c-.5.29-1.03.51-1.6.69L13 20.3h-2l-.55-2.24a6.9 6.9 0 0 1-1.6-.69l-2 1.2-1.42-1.42 1.2-2a6.9 6.9 0 0 1-.69-1.6L3.7 12v-2l2.24-.55c.18-.57.4-1.1.69-1.6l-1.2-2 1.42-1.42 2 1.2c.5-.29 1.03-.51 1.6-.69L11 3Zm1 6a3 3 0 1 0 0 6 3 3 0 0 0 0-6Z" />
              </svg>
            }
          }
        </span>
        {{ item.label }}
      </a>
    }
  </nav>

  <div class="sidebar-footer">
    <p>Freelance workspace</p>
    <a routerLink="/login">Account access</a>
  </div>
</aside>
