<section class="page">
  <div class="page-header">
    <div>
      <p class="eyebrow">Workspace</p>
      <h1 class="page-title">Settings</h1>
      <p class="page-description">Basic workspace preferences. These fields are static until persistence is added.</p>
    </div>
  </div>

  <article class="card">
    <form class="settings-form">
      <label>
        Workspace name
        <input type="text" value="AgencyOS Demo" />
      </label>

      <label>
        Default view
        <select>
          <option>Dashboard</option>
          <option>Clients</option>
          <option>Projects</option>
        </select>
      </label>

      <button class="primary-button" type="button">Save settings</button>
    </form>
  </article>
</section>
