<aside class="sidebar" aria-label="AgencyOS navigation">
  <a class="sidebar-brand" routerLink="/dashboard">
    <img class="brand-logo" src="agencyos-logo.png" alt="AgencyOS" />
  </a>

  <nav class="sidebar-nav" aria-label="Primary">
    @for (item of navItems; track item.route) {
      <a
        [routerLink]="item.route"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: item.exact }"
        ariaCurrentWhenActive="page"
      >
        @switch (item.icon) {
          @case ('home') {
            <svg lucideHouse class="sidebar-icon" aria-hidden="true"></svg>
          }
          @case ('clients') {
            <svg lucideUsers class="sidebar-icon" aria-hidden="true"></svg>
          }
          @case ('projects') {
            <svg lucideFolderKanban class="sidebar-icon" aria-hidden="true"></svg>
          }
          @case ('tasks') {
            <svg lucideCheckSquare class="sidebar-icon" aria-hidden="true"></svg>
          }
          @case ('settings') {
            <svg lucideSettings class="sidebar-icon" aria-hidden="true"></svg>
          }
        }
        <span>{{ item.label }}</span>
      </a>
    }
  </nav>

  <div class="sidebar-footer">
    <button class="signout-button" type="button" (click)="signOut()">
      <svg lucideLogOut class="sidebar-icon" aria-hidden="true"></svg>
      <span>Sign Out</span>
    </button>
  </div>
</aside>
